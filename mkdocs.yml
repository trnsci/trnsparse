site_name: trnsparse
site_description: Sparse matrix operations for AWS Trainium via NKI
site_url: https://trnsci.dev/trnsparse/
repo_url: https://github.com/trnsci/trnsparse
repo_name: trnsci/trnsparse

theme:
  name: material
  font:
    text: Atkinson Hyperlegible
    code: Atkinson Hyperlegible Mono
  palette:
    scheme: default
    primary: indigo
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - API Reference: api.md
  - Architecture: architecture.md
  - Benchmarks: benchmarks.md
  - Deployment:
      - AWS Setup for Neuron CI: aws_setup.md

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
